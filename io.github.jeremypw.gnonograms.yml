---

app-id: io.github.jeremypw.gnonograms
runtime: io.elementary.Platform
runtime-version: daily
sdk: io.elementary.Sdk
command: io.github.jeremypw.gnonograms

finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  # needed for perfers-color-scheme
  - '--system-talk-name=org.freedesktop.Accounts'
  - '--metadata=X-DConf=migrate-path=/io/github/jeremypw/gnonograms'

modules:
  - name: gnonograms
    buildsystem: meson
    sources:
      - type: dir
        path: .
}
